{% extends "base.html" %}
{% block title %}Thanks for subscribing{% endblock %}
{% block meta_description %}Thanks for joining the newsletter.{% endblock %}
{% block content %}
<section class="py-20 bg-white">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <div class="rounded-2xl border border-green-200 bg-green-50 p-10 shadow-sm">
      <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-full bg-green-100"><i class="fa-solid fa-check text-2xl text-green-600"></i></div>
      <h1 class="text-3xl font-bold text-green-900 mb-3">You’re subscribed</h1>
      <p class="text-green-800 mb-6">Thanks for joining. You’ll receive future updates in your inbox.</p>
      <a href="{% url 'home' %}" class="inline-flex rounded-lg bg-green-600 px-6 py-3 font-semibold text-white hover:bg-green-700 transition">Back to home</a>
    </div>
  </div>
</section>
{% endblock %}
