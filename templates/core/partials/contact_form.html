{% if error %}<div class="mb-6 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-red-700">{{ error }}</div>{% endif %}
<form hx-post="{% url 'contact' %}" hx-target="#contact-form-wrapper" hx-swap="innerHTML" class="space-y-6">
  {% csrf_token %}
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
    <div><label for="name" class="block text-sm font-medium text-gray-700 mb-2">Name *</label><input type="text" id="name" name="name" required value="{{ form.name|default:'' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Your name" aria-label="Your name"></div>
    <div><label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email *</label><input type="email" id="email" name="email" required value="{{ form.email|default:'' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="your@email.com" aria-label="your@email.com"></div>
  </div>
  <div><label for="subject" class="block text-sm font-medium text-gray-700 mb-2">Subject</label><input type="text" id="subject" name="subject" value="{{ form.subject|default:'' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="How can we help?" aria-label="How can we help?"></div>
  <div><label for="message" class="block text-sm font-medium text-gray-700 mb-2">Message *</label><textarea id="message" name="message" rows="5" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition resize-none" placeholder="Tell us what's on your mind...">{{ form.message|default:'' }}</textarea></div>
  <button type="submit" class="w-full sm:w-auto px-8 py-4 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition shadow-md">Send Message</button>
</form>
