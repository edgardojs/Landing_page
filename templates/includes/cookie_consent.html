<!-- GDPR Cookie Consent Popup with Granular Choices -->
<div id="cookie-consent-backdrop" class="fixed inset-0 bg-black/50 z-40 hidden" style="backdrop-filter: blur(4px);"></div>

<div id="cookie-consent" class="fixed bottom-4 left-4 right-4 sm:left-auto sm:right-4 sm:max-w-md bg-white rounded-xl shadow-2xl z-50 transform translate-y-[150%] transition-transform duration-300 border border-gray-200">
  
  <div class="p-6">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center">
        <i class="fa-solid fa-cookie-bite text-indigo-600"></i>
      </div>
      <div>
        <h3 class="text-lg font-bold text-gray-900">Cookie Preferences</h3>
        <p class="text-xs text-gray-500">GDPR Compliant</p>
      </div>
    </div>
    
    <!-- Description -->
    <p class="text-sm text-gray-600 mb-4">
      We use cookies to improve your experience. Choose which cookies you're comfortable with. 
      <a href="{% url 'privacy' %}" class="text-indigo-600 hover:text-indigo-700 underline">Learn more</a>
    </p>
    
    <!-- Cookie Options -->
    <div class="space-y-3 mb-5">
      
      <!-- Necessary (Always on) -->
      <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
        <div class="flex items-center gap-3">
          <div class="w-5 h-5 bg-green-500 rounded flex items-center justify-center">
            <i class="fa-solid fa-check text-white text-xs"></i>
          </div>
          <div>
            <p class="font-medium text-sm text-gray-900">Necessary</p>
            <p class="text-xs text-gray-500">Required for the site to function</p>
          </div>
        </div>
        <span class="text-xs font-medium text-green-600">Always On</span>
      </div>
      
      <!-- Analytics -->
      <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition">
        <div class="flex items-center gap-3">
          <input type="checkbox" id="analytics-cookies" class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
          <div>
            <p class="font-medium text-sm text-gray-900">Analytics</p>
            <p class="text-xs text-gray-500">Helps us improve our website</p>
          </div>
        </div>
      </div>
      
      <!-- Marketing -->
      <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100 transition">
        <div class="flex items-center gap-3">
          <input type="checkbox" id="marketing-cookies" class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
          <div>
            <p class="font-medium text-sm text-gray-900">Marketing</p>
            <p class="text-xs text-gray-500">Used to deliver relevant ads</p>
          </div>
        </div>
      </div>
      
    </div>
    
    <!-- Buttons -->
    <div class="flex flex-col gap-3">
      
      <button onclick="acceptNecessaryOnly()" class="w-full px-4 py-3 border-2 border-gray-300 text-gray-700 font-medium rounded-lg hover:border-gray-400 hover:bg-gray-50 transition">
        Accept Necessary Only
      </button>
      
      <button onclick="acceptSelected()" class="w-full px-4 py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition">
        Accept Selected
      </button>
      
    </div>
    
  </div>
</div>

<script>
  // Check if user has already made a choice
  function hasConsent() {
    return localStorage.getItem('cookieConsent') !== null;
  }
  
  // Show the banner
  function showCookieBanner() {
    const backdrop = document.getElementById('cookie-consent-backdrop');
    const banner = document.getElementById('cookie-consent');
    
    backdrop.classList.remove('hidden');
    banner.style.display = 'block';
    
    setTimeout(() => {
      banner.classList.remove('translate-y-[150%]');
      banner.classList.add('translate-y-0');
    }, 10);
  }
  
  // Hide the banner
  function hideCookieBanner() {
    const backdrop = document.getElementById('cookie-consent-backdrop');
    const banner = document.getElementById('cookie-consent');
    
    banner.classList.remove('translate-y-0');
    banner.classList.add('translate-y-[150%]');
    
    setTimeout(() => {
      banner.style.display = 'none';
      backdrop.classList.add('hidden');
    }, 300);
  }
  
  // Accept only necessary cookies
  function acceptNecessaryOnly() {
    const consent = {
      necessary: true,
      analytics: false,
      marketing: false,
      timestamp: new Date().toISOString()
    };
    
    localStorage.setItem('cookieConsent', JSON.stringify(consent));
    hideCookieBanner();
    
    console.log('Cookies: Necessary only accepted');
    // Disable analytics/marketing scripts here
  }
  
  // Accept selected cookies
  function acceptSelected() {
    const analytics = document.getElementById('analytics-cookies').checked;
    const marketing = document.getElementById('marketing-cookies').checked;
    
    const consent = {
      necessary: true,
      analytics: analytics,
      marketing: marketing,
      timestamp: new Date().toISOString()
    };
    
    localStorage.setItem('cookieConsent', JSON.stringify(consent));
    hideCookieBanner();
    
    console.log('Cookies: Selected preferences saved', consent);
    
    // Enable/disable scripts based on choices
    if (analytics) {
      // Enable analytics
    }
    if (marketing) {
      // Enable marketing
    }
  }
  
  // Check consent on page load
  document.addEventListener('DOMContentLoaded', function() {
    if (!hasConsent()) {
      setTimeout(showCookieBanner, 500);
    }
  });
  
  // Allow clicking backdrop to close (optional)
  document.getElementById('cookie-consent-backdrop').addEventListener('click', function() {
    // Uncomment below if you want backdrop click to trigger necessary-only
    // acceptNecessaryOnly();
  });
</script>
